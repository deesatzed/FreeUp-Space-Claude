name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - codex-ready

jobs:
  smoke:
    name: Smoke tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Validate shell syntax
        run: bash -n scripts/disk_audit.sh

      - name: Validate Python syntax
        run: python3 -m py_compile scripts/generate_report.py

      - name: Run smoke test
        run: python3 tests/smoke_test.py
